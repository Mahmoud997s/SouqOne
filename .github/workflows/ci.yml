name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # ════════════════════════════════════════
  # Quality: Lint + TypeCheck + Build
  # Single job — avoids repeated npm ci / cache restore
  # ════════════════════════════════════════
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Lint (affected)
        run: npx turbo run lint --filter="...[origin/main...HEAD]" --fallback
        if: github.event_name == 'pull_request'

      - name: Lint (all)
        run: npx turbo run lint
        if: github.event_name == 'push'

      - name: TypeCheck (affected)
        run: npx turbo run typecheck --filter="...[origin/main...HEAD]" --fallback
        if: github.event_name == 'pull_request'

      - name: TypeCheck (all)
        run: npx turbo run typecheck
        if: github.event_name == 'push'

      - name: Build
        run: npx turbo run build

  # ════════════════════════════════════════
  # API Tests — only when API code changes
  # ════════════════════════════════════════
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: carone_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Generate Prisma client
        run: npx turbo run db:generate

      - name: Push test schema
        run: npx prisma db push --skip-generate --accept-data-loss
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/carone_test

      - name: Run tests
        run: npm test
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/carone_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-jwt-secret-do-not-use-in-prod
          JWT_REFRESH_SECRET: ci-jwt-refresh-secret-do-not-use-in-prod
          NODE_ENV: test

  # ════════════════════════════════════════
  # Gate — single required status check
  # ════════════════════════════════════════
  ci-ok:
    name: CI ✓
    runs-on: ubuntu-latest
    if: always()
    needs: [quality, test-api]
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.quality.result }}" != "success" ]] || \
             [[ "${{ needs.test-api.result }}" != "success" ]]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ All checks passed"
